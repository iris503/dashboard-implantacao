name: Atualizar Dashboard

on:
  schedule:
    # Roda seg-sex às 08:00 (horário de Brasília = 11:00 UTC)
    - cron: '0 11 * * 1-5'
  workflow_dispatch: # Permite rodar manualmente

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Gerar dashboard v3
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_URL: https://wmi-solutions.atlassian.net
        run: python scripts/generate_dashboard_v3.py

      - name: Commit e push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet || (git commit -m "Dashboard v3 - $(date +'%d/%m/%Y %H:%M')" && git push)
