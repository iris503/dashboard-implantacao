<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Upsell Modules – Tempo Médio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
a{text-decoration:none}
.hdr{background:linear-gradient(135deg,#1e1b4b,#0f172a);border-bottom:1px solid #1e293b;padding:20px 24px 16px}
.ttl{font-weight:800;font-size:17px;color:#f1f5f9}
.sub{font-size:11px;color:#64748b;margin-top:2px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.tab{padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:#1e293b;color:#94a3b8;transition:all .15s}
.tab.active{background:#6366f1;color:#fff}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:16px 24px 0}
.kpi{background:#1e293b;border-radius:10px;padding:12px 16px;border:1px solid #334155}
.kic{font-size:18px}.kv{font-size:22px;font-weight:800;color:#f1f5f9;line-height:1.1;margin-top:2px}
.kl{font-size:11px;color:#64748b;margin-top:2px}
.bnr{margin:12px 24px 0;background:#1e293b;border-radius:10px;padding:10px 16px;border:1px solid #334155;font-size:12px;color:#94a3b8;display:none;gap:8px;align-items:center}
.bnr strong{color:#f1f5f9}
.mods{padding:12px 24px 40px}
.card{background:#1e293b;border-radius:12px;margin-bottom:10px;border:1px solid #334155;overflow:hidden}
.row{padding:14px 16px;cursor:pointer;display:grid;grid-template-columns:200px 1fr 90px 70px;gap:12px;align-items:center}
.bar{height:6px;background:#0f172a;border-radius:3px;overflow:hidden}
.fill{height:100%;border-radius:3px}
.avg{font-weight:800;font-size:15px;text-align:right}
.cnt{font-size:10px;color:#64748b;text-align:right}
.delta{font-size:11px;font-weight:700;border-radius:6px;padding:3px 7px;display:inline-block}
.up{color:#f87171;background:#450a0a}.dn{color:#34d399;background:#052e16}.nw{color:#64748b;font-size:10px}
.det{background:#0a0f1e;display:none}.det.open{display:block}
.cmp{padding:10px 16px;background:#1e293b;border-bottom:1px solid #334155;display:flex;gap:24px;flex-wrap:wrap;font-size:11px;color:#94a3b8}
table{width:100%;border-collapse:collapse;font-size:11px}
thead tr{background:#1e293b}
th{padding:8px 16px;text-align:left;color:#64748b;font-weight:600}
th:last-child{text-align:right}
tbody tr{border-top:1px solid #1e293b}
tbody tr:nth-child(odd){background:#0d1625}
td{padding:8px 16px;color:#94a3b8;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.time{text-align:right;color:#e2e8f0;font-weight:700}
tfoot tr{background:#1e293b}
tfoot td{padding:8px 16px;color:#64748b;font-size:11px}
tfoot td.sum{text-align:right;font-weight:800;font-size:14px}
.foot{text-align:center;padding-bottom:24px;color:#334155;font-size:10px}
.badge{display:inline-flex;align-items:center;gap:4px;background:#052e16;color:#34d399;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:600;margin-left:8px}
</style>
</head>
<body>
<div class="hdr">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
    <div style="background:#6366f1;border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px">📊</div>
    <div>
      <div class="ttl">Upsell Modules · Tempo Médio por Implantação <span class="badge">✓ Apenas Concluídos</span></div>
      <div class="sub">IWN · status = Concluído · Time Sheet (Jira Worklog) · Atualizado 05/06/2026</div>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
</div>
<div class="kpis" id="kpis"></div>
<div class="bnr" id="bnr"></div>
<div class="mods" id="mods"></div>
<div class="foot">Fonte: IWN Jira · status=Done (Concluído) · aggregatetimespent · 05/06/2026</div>
<script>
const B="https://wmi-solutions.atlassian.net/browse/";
const PAL=["#6366f1","#f59e0b","#10b981","#ec4899","#3b82f6","#8b5cf6","#f97316","#06b6d4","#84cc16","#a78bfa","#fb923c","#94a3b8","#e879f9","#34d399","#fbbf24","#f43f5e","#0ea5e9","#d946ef","#22d3ee","#e11d48","#65a30d","#7c3aed","#c026d3","#0891b2"];
function nm(v){return v==="Stock Module"?"Estoque":v==="Finance Module"?"Financeiro":v==="Fila de atendimento"?"Fila de Atendimento":v}

const D=[

];

const MONTHS=[...new Set(D.map(i=>i.d.slice(0,7)))].sort().reverse();
const CMAP=(()=>{const mods=[...new Set(D.map(i=>nm(i.m)))].sort();const r={};mods.forEach((m,i)=>{r[m]=PAL[i%PAL.length]});return r})();
const MIN_MAP=(()=>{const map={};for(const i of D){const m=nm(i.m);if(i.s<3600)continue;if(!map[m]||i.s<map[m].s)map[m]={s:i.s,k:i.k,t:i.t,d:i.d}}return map})();

function fmt(s){if(!s)return"—";const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);if(!h)return m+"min";if(!m)return h+"h";return h+"h "+m+"min"}
function mLbl(k){const[y,m]=k.split("-");return new Date(+y,+m-1,1).toLocaleDateString("pt-BR",{month:"long",year:"numeric"})}
function agg(items){
  const map={};
  for(const i of items){const m=nm(i.m);if(i.s<3600)continue;if(!map[m])map[m]={tot:0,n:0,tix:[]};map[m].tot+=i.s;map[m].n++;map[m].tix.push({...i,m})}
  return Object.entries(map).map(([name,v])=>({name,n:v.n,avg:Math.round(v.tot/v.n),tix:v.tix.sort((a,b)=>b.s-a.s),color:CMAP[name]||"#94a3b8"})).sort((a,b)=>b.avg-a.avg)
}
let sel=MONTHS[0],open=null;

function render(){
  const items=D.filter(i=>i.d.slice(0,7)===sel);
  const data=agg(items);
  const pK=MONTHS[MONTHS.indexOf(sel)+1]||null;
  const pMap=pK?Object.fromEntries(agg(D.filter(i=>i.d.slice(0,7)===pK)).map(d=>[d.name,d])):null;
  const maxA=Math.max(...data.map(d=>d.avg),1);
  const tot=data.reduce((s,d)=>s+d.n,0);
  const gA=data.length?Math.round(data.reduce((s,d)=>s+d.avg,0)/data.length):0;

  document.getElementById("tabs").innerHTML=MONTHS.map(m=>`<button class="tab${m===sel?" active":""}" onclick="sw('${m}')">${mLbl(m)}</button>`).join("");
  document.getElementById("kpis").innerHTML=[
    {ic:"📦",v:data.length,l:"Módulos ativos"},
    {ic:"✅",v:tot,l:"Implantações concluídas"},
    {ic:"⏱",v:fmt(gA),l:"Média geral do mês"},
  ].map(k=>`<div class="kpi"><div class="kic">${k.ic}</div><div class="kv">${k.v}</div><div class="kl">${k.l}</div></div>`).join("");

  const bnr=document.getElementById("bnr");
  if(pK){bnr.style.display="flex";bnr.innerHTML=`📊 <strong>Comparando</strong>&nbsp;${mLbl(sel)} vs ${mLbl(pK)} — expanda qualquer módulo`}
  else bnr.style.display="none";

  document.getElementById("mods").innerHTML=data.map(d=>{
    const p=pMap&&pMap[d.name];
    const diff=p?d.avg-p.avg:null;
    const pct=p?Math.round((diff/p.avg)*100):null;
    const bw=Math.round((d.avg/maxA)*100);
    const isO=open===d.name;
    let dlt=`<span class="delta nw">novo</span>`;
    if(diff!==null)dlt=`<span class="delta ${diff>0?"up":"dn"}">${diff>0?"▲":"▼"}${Math.abs(pct)}%</span>`;
    const mn=MIN_MAP[d.name];
    const minBar=mn?`<div style="padding:6px 16px 10px;display:flex;align-items:center;gap:8px;border-top:1px solid #1e293b;background:#0f172a22"><span style="font-size:10px;color:#64748b">⚡ Menor tempo histórico:</span><a href="${B+mn.k}" target="_blank" style="font-size:11px;font-weight:700;color:${d.color};font-family:monospace">${mn.k}</a><span style="font-size:11px;font-weight:800;color:#34d399">${fmt(mn.s)}</span><span style="font-size:10px;color:#475569;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${mn.t}</span><span style="font-size:10px;color:#334155">${mn.d.slice(0,7)}</span></div>`:"";
    let det="";
    if(isO){
      let cmp="";
      if(p){const dc=diff>0?"#f87171":"#34d399";cmp=`<div class="cmp"><span><span style="color:#64748b">Mês atual: </span><strong style="color:${d.color}">${fmt(d.avg)}</strong> <span style="color:#475569">(${d.n} epics)</span></span><span><span style="color:#64748b">${mLbl(pK)}: </span><strong style="color:#94a3b8">${fmt(p.avg)}</strong> <span style="color:#475569">(${p.n} epics)</span></span><span><span style="color:#64748b">Δ: </span><strong style="color:${dc}">${diff>0?"+":""}${fmt(Math.abs(diff))} (${diff>0?"+":""}${pct}%)</strong></span></div>`}
      const rows=d.tix.map((t,i)=>`<tr style="background:${i%2===0?"#0d1625":"transparent"}"><td><a href="${B+t.k}" target="_blank" style="color:${d.color};font-family:monospace;font-weight:700">${t.k}</a></td><td>${t.t}</td><td class="time">${fmt(t.s)}</td></tr>`).join("");
      det=`<div class="det open" style="border-top:1px solid ${d.color}33">${cmp}<table><thead><tr><th style="width:90px">Ticket</th><th>Laboratório</th><th style="text-align:right;width:90px">Tempo</th></tr></thead><tbody>${rows}</tbody><tfoot><tr><td colspan="2">Média (${d.n} epics)</td><td class="sum" style="color:${d.color}">${fmt(d.avg)}</td></tr></tfoot></table></div>`;
    }
    return `<div class="card" style="border-color:${isO?d.color+"55":"#334155"}"><div class="row" onclick="tog('${d.name.replace(/'/g,"\\'")}')"><div style="display:flex;align-items:center;gap:8px;min-width:0"><div style="width:10px;height:10px;border-radius:50%;background:${d.color};flex-shrink:0"></div><span style="font-weight:700;font-size:13px;color:#f1f5f9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.name}</span></div><div class="bar"><div class="fill" style="width:${bw}%;background:${d.color}"></div></div><div><div class="avg" style="color:${d.color}">${fmt(d.avg)}</div><div class="cnt">${d.n} epic${d.n>1?"s":""}</div></div><div style="text-align:right">${dlt}</div></div>${minBar}${det}</div>`;
  }).join("");
}
function sw(m){sel=m;open=null;render()}
function tog(name){open=open===name?null:name;render()}
render();
</script>
</body>
</html>
