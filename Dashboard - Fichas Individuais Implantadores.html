<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Fichas Individuais | WMI Solutions</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            line-height: 1.6;
        }

        /* ============ HEADER ============ */
        header {
            background: linear-gradient(135deg, #161b22 0%, #0d1117 100%);
            border-bottom: 1px solid #30363d;
            padding: 2rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #06b6d4;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-info {
            text-align: right;
            font-size: 0.875rem;
            color: #8b949e;
        }

        .header-info strong {
            color: #c9d1d9;
        }

        /* ============ MAIN CONTAINER ============ */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* ============ GRID VIEW (MAIN PAGE) ============ */
        #gridView {
            display: grid;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #c9d1d9;
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .controls label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .controls select {
            padding: 0.5rem 1rem;
            background-color: #161b22;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .controls select:hover {
            border-color: #06b6d4;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            border-color: #06b6d4;
            box-shadow: 0 8px 16px rgba(6, 182, 212, 0.1);
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .card-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #06b6d4;
        }

        .risk-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .risk-badge.high {
            background-color: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .risk-badge.medium {
            background-color: rgba(249, 115, 22, 0.2);
            color: #f97316;
        }

        .risk-badge.low {
            background-color: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .card-metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .metric {
            display: flex;
            flex-direction: column;
        }

        .metric-label {
            color: #8b949e;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .metric-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: #c9d1d9;
            margin-top: 0.25rem;
        }

        .completion-bar {
            width: 100%;
            height: 4px;
            background-color: #30363d;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 0.5rem;
        }

        .completion-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .completion-fill.high {
            background-color: #22c55e;
        }

        .completion-fill.medium {
            background-color: #eab308;
        }

        .completion-fill.low {
            background-color: #ef4444;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid #30363d;
            font-size: 0.85rem;
        }

        .hours-info {
            color: #8b949e;
        }

        .board-split {
            display: flex;
            gap: 2px;
            height: 8px;
            border-radius: 2px;
            overflow: hidden;
        }

        .board-split-section {
            flex: 1;
            border-radius: 1px;
        }

        /* ============ DETAIL VIEW ============ */
        #detailView {
            display: none;
        }

        .detail-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #30363d;
        }

        .back-button {
            background-color: #161b22;
            border: 1px solid #30363d;
            color: #06b6d4;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            border-color: #06b6d4;
            background-color: rgba(6, 182, 212, 0.1);
        }

        .detail-title {
            font-size: 2rem;
            font-weight: 700;
            color: #c9d1d9;
            flex: 1;
        }

        /* ============ KPI CARDS ============ */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .kpi-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
        }

        .kpi-card.clickable {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .kpi-card.clickable:hover {
            border-color: #06b6d4;
            background-color: rgba(6, 182, 212, 0.05);
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.1);
        }

        .kpi-label {
            color: #8b949e;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .kpi-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #06b6d4;
        }

        .kpi-subtitle {
            font-size: 0.9rem;
            color: #8b949e;
            margin-top: 0.5rem;
        }

        /* ============ EPIC EXPANSION PANEL ============ */
        .epic-panel {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            margin-bottom: 2rem;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .epic-panel.active {
            max-height: 1000px;
            opacity: 1;
            margin-bottom: 2rem;
        }

        .epic-panel-header {
            background-color: #0d1117;
            border-bottom: 1px solid #30363d;
            padding: 1.5rem;
        }

        .epic-panel-summary {
            display: flex;
            gap: 2rem;
            font-size: 0.95rem;
        }

        .epic-summary-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .epic-summary-label {
            color: #8b949e;
            text-transform: uppercase;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .epic-summary-value {
            color: #c9d1d9;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .epic-summary-value.overdue {
            color: #ef4444;
        }

        .epic-summary-value.zero-hours {
            color: #f97316;
        }

        .epic-panel-content {
            padding: 1.5rem;
            overflow-x: auto;
        }

        .epic-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .epic-table thead {
            background-color: #0d1117;
            border-bottom: 2px solid #30363d;
        }

        .epic-table th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        .epic-table td {
            padding: 1rem;
            border-bottom: 1px solid #30363d;
            color: #c9d1d9;
        }

        .epic-table tbody tr:last-child td {
            border-bottom: none;
        }

        .epic-table tbody tr:hover {
            background-color: rgba(6, 182, 212, 0.05);
        }

        .epic-table tbody tr.overdue {
            background-color: rgba(239, 68, 68, 0.08);
        }

        .epic-table tbody tr.paused {
            background-color: rgba(234, 179, 8, 0.08);
        }

        .epic-key-link {
            color: #06b6d4;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .epic-key-link:hover {
            color: #22c55e;
            text-decoration: underline;
        }

        .epic-badge-overdue {
            display: inline-block;
            padding: 0.35rem 0.75rem;
            border-radius: 4px;
            background-color: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .epic-badge-ok {
            display: inline-block;
            padding: 0.35rem 0.75rem;
            border-radius: 4px;
            background-color: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .epic-badge-nodate {
            display: inline-block;
            padding: 0.35rem 0.75rem;
            border-radius: 4px;
            background-color: rgba(139, 148, 158, 0.2);
            color: #8b949e;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* ============ CHARTS ============ */
        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .chart-container {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1.5rem;
        }

        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #c9d1d9;
            margin-bottom: 1rem;
            text-align: center;
        }

        .chart-wrapper {
            position: relative;
            height: 300px;
        }

        /* ============ TABLES ============ */
        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #c9d1d9;
            margin-top: 2rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 24px;
            background-color: #06b6d4;
            border-radius: 2px;
        }

        .table-responsive {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 2rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        thead {
            background-color: #0d1117;
            border-bottom: 2px solid #30363d;
        }

        th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid #30363d;
            color: #c9d1d9;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover {
            background-color: rgba(6, 182, 212, 0.05);
        }

        .status-badge {
            display: inline-block;
            padding: 0.35rem 0.75rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-badge.concluido {
            background-color: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .status-badge.em-andamento {
            background-color: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .status-badge.paused {
            background-color: rgba(234, 179, 8, 0.2);
            color: #eab308;
        }

        .status-badge.pendente {
            background-color: rgba(139, 148, 158, 0.2);
            color: #8b949e;
        }

        .board-badge {
            display: inline-block;
            padding: 0.35rem 0.75rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .board-badge.novo {
            background-color: rgba(6, 182, 212, 0.2);
            color: #06b6d4;
        }

        .board-badge.upsell {
            background-color: rgba(249, 115, 22, 0.2);
            color: #f97316;
        }

        .hours-cell {
            font-weight: 600;
            color: #a78bfa;
        }

        .overdue-cell {
            color: #ef4444;
            font-weight: 600;
        }

        /* ============ ANALYSIS BOX ============ */
        .analysis-box {
            background-color: #161b22;
            border-left: 4px solid #06b6d4;
            border: 1px solid #30363d;
            border-left: 4px solid #06b6d4;
            border-radius: 8px;
            padding: 1.5rem;
            margin: 2rem 0;
            line-height: 1.8;
        }

        .analysis-box.high-risk {
            border-left-color: #ef4444;
        }

        .analysis-box.medium-risk {
            border-left-color: #f97316;
        }

        .analysis-box.low-risk {
            border-left-color: #22c55e;
        }

        .analysis-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .analysis-box.high-risk .analysis-label {
            color: #ef4444;
        }

        .analysis-box.medium-risk .analysis-label {
            color: #f97316;
        }

        .analysis-box.low-risk .analysis-label {
            color: #22c55e;
        }

        /* ============ STRENGTHS & RISKS ============ */
        .strengths-risks {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .strength-box, .risk-box {
            border-radius: 8px;
            padding: 1.5rem;
        }

        .strength-box {
            background-color: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .risk-box {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .strength-box .box-title {
            color: #22c55e;
        }

        .risk-box .box-title {
            color: #ef4444;
        }

        .box-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .box-content {
            color: #c9d1d9;
        }

        .box-content ul {
            list-style: none;
            padding-left: 1.5rem;
        }

        .box-content li {
            margin-bottom: 0.75rem;
            position: relative;
        }

        .box-content li::before {
            content: '▸';
            position: absolute;
            left: -1.5rem;
        }

        .strength-box li::before {
            color: #22c55e;
        }

        .risk-box li::before {
            color: #ef4444;
        }

        /* ============ PROGRESS BARS ============ */
        .subtype-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #30363d;
        }

        .subtype-row:last-child {
            border-bottom: none;
        }

        .subtype-name {
            font-weight: 500;
            min-width: 200px;
            color: #c9d1d9;
        }

        .subtype-stats {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex: 1;
            margin-left: 2rem;
        }

        .subtype-bar {
            flex: 1;
            max-width: 300px;
        }

        .mini-progress {
            width: 100%;
            height: 6px;
            background-color: #30363d;
            border-radius: 3px;
            overflow: hidden;
        }

        .mini-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #06b6d4, #22c55e);
            border-radius: 3px;
        }

        .subtype-count {
            color: #8b949e;
            font-size: 0.85rem;
            min-width: 80px;
        }

        /* ============ FOOTER ============ */
        footer {
            background-color: #161b22;
            border-top: 1px solid #30363d;
            padding: 2rem;
            margin-top: 4rem;
            text-align: center;
            color: #8b949e;
            font-size: 0.85rem;
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 768px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }

            .charts-row {
                grid-template-columns: 1fr;
            }

            .strengths-risks {
                grid-template-columns: 1fr;
            }

            .kpi-row {
                grid-template-columns: repeat(2, 1fr);
            }

            .detail-header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }

            .detail-title {
                order: 2;
            }

            table {
                font-size: 0.8rem;
            }

            th, td {
                padding: 0.75rem;
            }

            .epic-panel-summary {
                flex-direction: column;
                gap: 0.5rem;
            }
        }

        /* ============ LOADING & TRANSITIONS ============ */
        .hidden {
            display: none !important;
        }

        .fade-in {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============ SORTABLE HINT ============ */
        .sort-hint {
            font-size: 0.75rem;
            color: #8b949e;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                📊 WMI Solutions
            </div>
            <div class="header-info">
                <strong>Coordenadora de Implantação:</strong> Iris <br>
                <strong>Período:</strong> Dados consolidados até 30/03/2026
            </div>
        </div>
    </header>

    <div class="container">
        <!-- ============ GRID VIEW ============ -->
        <div id="gridView" class="fade-in">
            <h1 class="page-title">Fichas Individuais - Implantadores</h1>

            <div class="controls">
                <label>
                    Ordenar por:
                    <select id="sortSelect">
                        <option value="completion">Taxa de Conclusão (↓)</option>
                        <option value="total">Total de Epics (↓)</option>
                        <option value="risk">Nível de Risco (↑)</option>
                        <option value="hours">Horas Registradas (↓)</option>
                    </select>
                </label>
            </div>

            <div class="cards-grid" id="cardsContainer">
                <!-- Cards generated by JavaScript -->
            </div>
        </div>

        <!-- ============ DETAIL VIEW ============ -->
        <div id="detailView">
            <div class="detail-header">
                <button class="back-button" onclick="showGrid()">← Voltar à Grade</button>
                <h1 class="detail-title" id="detailName"></h1>
            </div>

            <!-- KPI Row -->
            <div class="kpi-row" id="kpiContainer">
                <!-- Generated by JavaScript -->
            </div>

            <!-- Epic Panel (Expansion) -->
            <div class="epic-panel" id="epicPanel">
                <div class="epic-panel-header">
                    <div class="epic-panel-summary" id="epicPanelSummary">
                        <!-- Generated by JavaScript -->
                    </div>
                </div>
                <div class="epic-panel-content">
                    <table class="epic-table" id="epicTableInPanel">
                        <!-- Generated by JavaScript -->
                    </table>
                </div>
            </div>

            <!-- Charts Row -->
            <div class="charts-row" id="chartsContainer">
                <!-- Generated by JavaScript -->
            </div>

            <!-- Subtypes Table -->
            <div>
                <h2 class="section-title">Distribuição por Tipo de Demanda</h2>
                <div class="table-responsive" id="subtypesContainer">
                    <!-- Generated by JavaScript -->
                </div>
            </div>

            <!-- Analysis Box -->
            <div id="analysisContainer">
                <!-- Generated by JavaScript -->
            </div>

            <!-- Strengths & Risks -->
            <div id="strengthsRisksContainer">
                <!-- Generated by JavaScript -->
            </div>

            <!-- Epics Table -->
            <div>
                <h2 class="section-title">Detalhamento de Epics Abertos</h2>
                <div class="table-responsive" id="epicsContainer">
                    <!-- Generated by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <footer>
        Dados extraídos do Jira (IWN) em 09/04/2026 | Análise individual por implantador
    </footer>

    <script>
        // ============ DATA ============
        const TODAY = new Date('2026-04-09');
        const JIRA_BASE = 'https://wmi-solutions.atlassian.net/browse/';

        function calculateDaysOpen(createdDate) {
            const created = new Date(createdDate);
            const diffTime = TODAY - created;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays;

        // ============ UTILITIES ============
        function getCompletionRate(tech) {
            return Math.round((tech.completed / tech.total) * 100);
        }

        function getRiskLevel(tech) {
            const rate = getCompletionRate(tech);
            const overdueRatio = tech.overdueCount / tech.openCount;

            if (rate < 40 || tech.overdueCount > 5 || overdueRatio > 0.5) return 'high';
            if (rate < 60 || tech.overdueCount > 2) return 'medium';
            return 'low';
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'Sem data';
            const date = new Date(dateStr);
            return date.toLocaleDateString('pt-BR');
        }

        function isOverdue(dueDate) {
            if (!dueDate) return false;
            return new Date(dueDate) < TODAY;
        }

        function sortTechs(sortBy) {
            const sorted = [...technicians];

            switch(sortBy) {
                case 'completion':
                    sorted.sort((a, b) => getCompletionRate(b) - getCompletionRate(a));
                    break;
                case 'total':
                    sorted.sort((a, b) => b.total - a.total);
                    break;
                case 'risk':
                    const riskOrder = { high: 3, medium: 2, low: 1 };
                    sorted.sort((a, b) => riskOrder[getRiskLevel(b)] - riskOrder[getRiskLevel(a)]);
                    break;
                case 'hours':
                    sorted.sort((a, b) => b.hours - a.hours);
                    break;
            }

            return sorted;
        }

        // ============ RENDER GRID ============
        function renderGrid() {
            const container = document.getElementById('cardsContainer');
            const sortBy = document.getElementById('sortSelect').value;
            const sorted = sortTechs(sortBy);

            container.innerHTML = sorted.map(tech => {
                const rate = getCompletionRate(tech);
                const risk = getRiskLevel(tech);
                const rateColor = rate > 70 ? 'high' : rate > 50 ? 'medium' : 'low';

                return `
                    <div class="card fade-in" onclick="showDetail(${tech.id})">
                        <div class="card-header">
                            <div class="card-name">${tech.name}</div>
                            ${tech.overdueCount > 3 ? `<span class="risk-badge ${risk}">⚠ ${risk.toUpperCase()}</span>` : ''}
                        </div>

                        <div class="card-metrics">
                            <div class="metric">
                                <div class="metric-label">Total de Epics</div>
                                <div class="metric-value">${tech.total}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">Taxa Conclusão</div>
                                <div class="metric-value">${rate}%</div>
                                <div class="completion-bar">
                                    <div class="completion-fill ${rateColor}" style="width: ${rate}%"></div>
                                </div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">Abertos/Vencidos</div>
                                <div class="metric-value">${tech.openCount}/${tech.overdueCount}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">Horas Totais</div>
                                <div class="metric-value">${tech.hours.toFixed(1)}h</div>
                            </div>
                        </div>

                        <div class="card-footer">
                            <div class="hours-info">
                                <strong>${tech.hoursPerEpic.toFixed(1)}h</strong>/Epic
                            </div>
                            <div class="board-split">
                                <div class="board-split-section" style="background-color: #06b6d4; flex: ${tech.board.novo}"></div>
                                <div class="board-split-section" style="background-color: #f97316; flex: ${tech.board.upsell}"></div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ============ RENDER DETAIL ============
        function renderDetail(techId) {
            const tech = technicians.find(t => t.id === techId);
            if (!tech) return;

            const rate = getCompletionRate(tech);
            const riskClass = getRiskLevel(tech);

            renderKPIs(tech);
            renderEpicPanel(tech);
            renderCharts(tech);
            renderSubtypes(tech);
            renderAnalysis(tech, riskClass);
            renderStrengthsRisks(tech);
        }

        function renderKPIs(tech) {
            const rate = getCompletionRate(tech);
            const container = document.getElementById('kpiContainer');

            container.innerHTML = `
                <div class="kpi-card">
                    <div class="kpi-label">Total de Epics</div>
                    <div class="kpi-value">${tech.total}</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">Taxa de Conclusão</div>
                    <div class="kpi-value">${rate}%</div>
                    <div class="kpi-subtitle">${tech.completed} de ${tech.total} concluídos</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">Horas Totais Registradas</div>
                    <div class="kpi-value">${tech.hours.toFixed(1)}h</div>
                    <div class="kpi-subtitle">${tech.hoursPerEpic.toFixed(1)}h por epic</div>
                </div>
                <div class="kpi-card clickable" onclick="toggleEpicPanel(event)">
                    <div class="kpi-label">Epics Abertos/Vencidos</div>
                    <div class="kpi-value">${tech.openCount}/${tech.overdueCount}</div>
                    <div class="kpi-subtitle">🔽 Clique para ver detalhes</div>
                </div>
            `;
        }

        function renderEpicPanel(tech) {
            const panel = document.getElementById('epicPanel');
            const summary = document.getElementById('epicPanelSummary');
            const overdue = tech.openEpics.filter(e => isOverdue(e.due) && e.due).length;
            const noHours = tech.openEpics.filter(e => e.hours === 0).length;

            summary.innerHTML = `
                <div class="epic-summary-item">
                    <div class="epic-summary-label">Total Abertos</div>
                    <div class="epic-summary-value">${tech.openEpics.length}</div>
                </div>
                <div class="epic-summary-item">
                    <div class="epic-summary-label">Vencidos</div>
                    <div class="epic-summary-value overdue">${overdue}</div>
                </div>
                <div class="epic-summary-item">
                    <div class="epic-summary-label">Sem Horas</div>
                    <div class="epic-summary-value zero-hours">${noHours}</div>
                </div>
            `;

            const sorted = [...tech.openEpics].sort((a, b) => {
                if (isOverdue(a.due) && !isOverdue(b.due)) return -1;
                if (!isOverdue(a.due) && isOverdue(b.due)) return 1;
                if (isOverdue(a.due) && isOverdue(b.due)) {
                    return new Date(a.due) - new Date(b.due);
                }
                if (a.due && b.due) return new Date(b.due) - new Date(a.due);
                return 0;
            });

            const rows = sorted.map(epic => {
                const daysOpen = calculateDaysOpen(epic.created);
                let dateDisplay = '';
                if (!epic.due) {
                    dateDisplay = '<span class="epic-badge-nodate">Sem data</span>';
                } else if (isOverdue(epic.due)) {
                    dateDisplay = `<span class="epic-badge-overdue">VENCIDO</span>`;
                } else {
                    dateDisplay = `<span class="epic-badge-ok">${formatDate(epic.due)}</span>`;
                }

                const statusClass = epic.status === 'Concluído' ? 'concluido' :
                                    epic.status === 'Em andamento' ? 'em-andamento' :
                                    epic.status === 'Paused' ? 'paused' : 'pendente';
                const boardClass = epic.board === 'Novo' ? 'novo' : 'upsell';
                const rowClass = isOverdue(epic.due) ? 'overdue' : epic.status === 'Paused' ? 'paused' : '';

                return `
                    <tr class="${rowClass}">
                        <td><a href="${JIRA_BASE}${epic.key}" target="_blank" class="epic-key-link">${epic.key}</a></td>
                        <td><strong>${epic.title}</strong></td>
                        <td><span class="status-badge ${statusClass}">${epic.status}</span></td>
                        <td><span class="board-badge ${boardClass}">${epic.board}</span></td>
                        <td>${dateDisplay}</td>
                        <td class="hours-cell">${epic.hours.toFixed(1)}h</td>
                        <td>${daysOpen}d</td>
                    </tr>
                `;
            }).join('');

            document.getElementById('epicTableInPanel').innerHTML = `
                <thead>
                    <tr>
                        <th style="width: 90px;">Epic</th>
                        <th>Título / Client</th>
                        <th style="width: 110px;">Status</th>
                        <th style="width: 80px;">Board</th>
                        <th style="width: 130px;">Data Vencimento</th>
                        <th style="width: 80px;">Horas</th>
                        <th style="width: 70px;">Dias Aberto</th>
                    </tr>
                </thead>
                <tbody>
                    ${rows}
                </tbody>
            `;
        }

        function toggleEpicPanel(event) {
            event.stopPropagation();
            const panel = document.getElementById('epicPanel');
            panel.classList.toggle('active');
        }

        function renderCharts(tech) {
            const container = document.getElementById('chartsContainer');
            const rate = getCompletionRate(tech);

            container.innerHTML = `
                <div class="chart-container">
                    <div class="chart-title">Distribuição de Status</div>
                    <div class="chart-wrapper">
                        <canvas id="statusChart"></canvas>
                    </div>
                </div>
                <div class="chart-container">
                    <div class="chart-title">Novo vs Upsell (Concluído/Aberto)</div>
                    <div class="chart-wrapper">
                        <canvas id="boardChart"></canvas>
                    </div>
                </div>
            `;

            setTimeout(() => {
                const statusCtx = document.getElementById('statusChart').getContext('2d');
                new Chart(statusCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Concluído', 'Em Andamento', 'Paused', 'Pendente'],
                        datasets: [{
                            data: [tech.completed, tech.inProgress, tech.paused, tech.pending],
                            backgroundColor: ['#22c55e', '#3b82f6', '#eab308', '#8b949e'],
                            borderColor: '#161b22',
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: { color: '#c9d1d9', font: { size: 12 } }
                            }
                        }
                    }
                });
            }, 0);

            setTimeout(() => {
                const boardCtx = document.getElementById('boardChart').getContext('2d');
                const completedNovo = Math.round((tech.completed * tech.board.novo) / tech.total);
                const completedUpsell = tech.completed - completedNovo;

                new Chart(boardCtx, {
                    type: 'bar',
                    data: {
                        labels: ['Novo', 'Upsell'],
                        datasets: [
                            {
                                label: 'Concluído',
                                data: [completedNovo, completedUpsell],
                                backgroundColor: '#22c55e',
                                borderColor: '#161b22',
                                borderWidth: 1
                            },
                            {
                                label: 'Aberto',
                                data: [
                                    tech.board.novo - completedNovo,
                                    tech.board.upsell - completedUpsell
                                ],
                                backgroundColor: '#ef4444',
                                borderColor: '#161b22',
                                borderWidth: 1
                            }
                        ]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: {
                                stacked: true,
                                ticks: { color: '#8b949e' },
                                grid: { color: '#30363d' }
                            },
                            y: {
                                stacked: true,
                                ticks: { color: '#8b949e' }
                            }
                        },
                        plugins: {
                            legend: {
                                labels: { color: '#c9d1d9', font: { size: 12 } }
                            }
                        }
                    }
                });
            }, 0);
        }

        function renderSubtypes(tech) {
            const container = document.getElementById('subtypesContainer');

            const rows = tech.subtypes.map(sub => {
                const percent = Math.round((sub.completed / sub.count) * 100);
                return `
                    <div class="subtype-row">
                        <div class="subtype-name">${sub.name}</div>
                        <div class="subtype-stats">
                            <div class="subtype-bar">
                                <div class="mini-progress">
                                    <div class="mini-progress-fill" style="width: ${percent}%"></div>
                                </div>
                            </div>
                            <div class="subtype-count">${sub.completed}/${sub.count}</div>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = `<div style="padding: 1.5rem;">${rows}</div>`;
        }

        function renderAnalysis(tech, riskClass) {
            const container = document.getElementById('analysisContainer');
            const riskLabel = { high: 'Alto Risco', medium: 'Médio Risco', low: 'Baixo Risco' };

            container.innerHTML = `
                <div class="analysis-box ${riskClass}-risk">
                    <div class="analysis-label">📋 Análise - ${riskLabel[riskClass]}</div>
                    <p>${tech.analysis}</p>
                </div>
            `;
        }

        function renderStrengthsRisks(tech) {
            const container = document.getElementById('strengthsRisksContainer');

            const strengthsList = tech.strengths.map(s => `<li>${s}</li>`).join('');
            const risksList = tech.risks.map(r => `<li>${r}</li>`).join('');

            container.innerHTML = `
                <div class="strengths-risks">
                    <div class="strength-box">
                        <div class="box-title">✓ Pontos Fortes</div>
                        <div class="box-content">
                            <ul>${strengthsList}</ul>
                        </div>
                    </div>
                    <div class="risk-box">
                        <div class="box-title">⚠ Riscos & Atenção</div>
                        <div class="box-content">
                            <ul>${risksList}</ul>
                        </div>
                    </div>
                </div>
            `;
        }

        // ============ NAVIGATION ============
        function showDetail(techId) {
            document.getElementById('gridView').style.display = 'none';
            document.getElementById('detailView').style.display = 'block';

            const tech = technicians.find(t => t.id === techId);
            document.getElementById('detailName').textContent = tech.name;

            renderDetail(techId);
            window.scrollTo(0, 0);
        }

        function showGrid() {
            document.getElementById('detailView').style.display = 'none';
            document.getElementById('gridView').style.display = 'grid';
            document.getElementById('epicPanel').classList.remove('active');
            renderGrid();
            window.scrollTo(0, 0);
        }

        // ============ INIT ============
        document.getElementById('sortSelect').addEventListener('change', renderGrid);

        renderGrid();
    </script>
